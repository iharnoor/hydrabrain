<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="recall@5 — HydraDB 96.5%, gbrain full stack with reranker 92.1%, gbrain fusion core 75.4%">
  <rect x="0" y="0" width="760" height="300" rx="14" fill="#0f0f1e"/>
  <text x="32" y="44" fill="#ffffff" font-size="22" font-weight="700">recall@5 — HydraDB vs gbrain's stack</text>
  <text x="32" y="68" fill="#9aa0b4" font-size="13">19-document corpus · gbrain's own P@5 metric · higher is better</text>

  <!-- gridline at 100% -->
  <line x1="250" y1="92" x2="250" y2="270" stroke="#2a2a40" stroke-width="1"/>
  <line x1="710" y1="92" x2="710" y2="270" stroke="#2a2a40" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="710" y="288" fill="#5a5f73" font-size="11" text-anchor="middle">100%</text>

  <!-- HydraDB 96.5% -->
  <text x="234" y="123" fill="#c9b8ff" font-size="14" font-weight="600" text-anchor="end">HydraDB</text>
  <text x="234" y="139" fill="#6b7088" font-size="11" text-anchor="end">graph-native, no reranker</text>
  <rect x="250" y="104" width="444" height="34" rx="6" fill="#7c3aed"/>
  <text x="684" y="127" fill="#ffffff" font-size="15" font-weight="700" text-anchor="end">96.5%</text>

  <!-- gbrain full + reranker 92.1% -->
  <text x="234" y="183" fill="#ffd1b0" font-size="14" font-weight="600" text-anchor="end">gbrain full stack</text>
  <text x="234" y="199" fill="#6b7088" font-size="11" text-anchor="end">vector+BM25+RRF+reranker</text>
  <rect x="250" y="164" width="424" height="34" rx="6" fill="#ea580c"/>
  <text x="664" y="187" fill="#ffffff" font-size="15" font-weight="700" text-anchor="end">92.1%</text>

  <!-- gbrain fusion core 75.4% -->
  <text x="234" y="243" fill="#cbd0e0" font-size="14" font-weight="600" text-anchor="end">gbrain fusion core</text>
  <text x="234" y="259" fill="#6b7088" font-size="11" text-anchor="end">vector+BM25+RRF, no reranker</text>
  <rect x="250" y="224" width="347" height="34" rx="6" fill="#6b7280"/>
  <text x="587" y="247" fill="#ffffff" font-size="15" font-weight="700" text-anchor="end">75.4%</text>
</svg>
